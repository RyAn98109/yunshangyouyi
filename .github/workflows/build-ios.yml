name: Build iOS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 选择 Xcode 版本
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: 显示环境信息
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: 编译项目
        run: |
          xcodebuild build \
            -project ResidentCollection.xcodeproj \
            -scheme ResidentCollection \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: 打包 .ipa（未签名）
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/ResidentCollection.app Payload/
          zip -r ResidentCollection.ipa Payload
          ls -la ResidentCollection.ipa

      - name: 上传 .ipa 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ResidentCollection-ipa
          path: ResidentCollection.ipa
          retention-days: 30
